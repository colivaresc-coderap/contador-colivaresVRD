<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLIVARESVRD | Contador Estilo GTA V</title>
    <style>
        /* Estilos generales con fondo oscuro y neón */
        body { 
            font-family: 'Arial Black', 'Helvetica Bold', sans-serif; /* Usamos fuentes gruesas */
            text-align: center; 
            background: #0d0d0d; /* Fondo casi negro */
            color: white; 
            padding: 20px; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            text-transform: uppercase; /* Todo en mayúsculas */
        }

        /* Contenedor principal con efecto de neón sutil */
        .container { 
            background: rgba(13, 13, 13, 0.95); /* Fondo negro translúcido */
            padding: 40px; 
            border-radius: 5px; /* Bordes menos redondeados, más "duros" */
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3), 0 0 30px rgba(255, 0, 212, 0.3); /* Sombra de neón azul y rosa */
            min-width: 450px; 
            border: 2px solid #333; 
        }

        /* Estilo para el nombre COLIVARESVRD con hipervínculo y efecto GTA */
        .gta-title-link {
            text-decoration: none; /* Quitar subrayado del link */
            color: #00d4ff; /* Color neón cian inicial */
            font-size: 2.5rem; 
            font-weight: 900; 
            letter-spacing: -1px; /* Letras más juntas */
            text-shadow: 2px 2px 0px #ff00d4, 4px 4px 0px #000; /* Sombra doble neón rosa y negra */
            transition: all 0.3s ease; /* Transición suave */
            display: inline-block;
            margin-bottom: 25px;
        }

        /* Efecto al pasar el ratón sobre el link */
        .gta-title-link:hover {
            color: #ff00d4; /* Cambiar a rosa neón */
            text-shadow: 2px 2px 0px #00d4ff, 4px 4px 10px #ff00d4; /* Sombra invertida y brillante */
            transform: scale(1.05); /* Ligeramente más grande */
            filter: blur(0.5px); /* Un desenfoque sutil tipo GTA */
        }

        /* Cronómetro principal con fuente mono y neón */
        .main-timer { 
            font-size: 4.5rem; 
            font-weight: bold; 
            margin: 10px 0 30px 0; 
            color: #ff00d4; /* Rosa neón */
            font-family: 'Courier New', Courier, monospace; 
            text-shadow: 0 0 15px rgba(255, 0, 212, 0.6); 
            border-bottom: 3px solid #ff00d4;
            display: inline-block;
            padding-bottom: 10px;
        }

        /* Contenedor de estadísticas */
        .stats { 
            display: flex; 
            gap: 20px; 
            margin-bottom: 25px; 
        }

        /* Cuadros de estadísticas con colores GTA */
        .box { 
            flex: 1; 
            padding: 20px; 
            border-radius: 0; /* Bordes cuadrados */
            color: white; 
            border: 2px solid #333;
        }
        .bueno { 
            background: rgba(46, 125, 50, 0.8); /* Verde oscuro translúcido */
            border-color: #2e7d32;
        }
        .malo { 
            background: rgba(198, 40, 40, 0.8); /* Rojo oscuro translúcido */
            border-color: #c62828;
        }
        .box .count { 
            font-size: 3rem; 
            display: block; 
            font-weight: 900; 
            color: #fff;
            text-shadow: 2px 2px 0px #000;
        }

        /* Botones de acción estilo GTA (más cuadrados y con relieve) */
        .buttons-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn { 
            padding: 18px; 
            font-size: 1.1rem; 
            cursor: pointer; 
            border: none; 
            border-radius: 0; /* Bordes cuadrados */
            color: white; 
            font-weight: bold; 
            flex: 1; 
            transition: all 0.1s ease; 
            text-transform: uppercase; 
            border: 2px solid;
            font-family: 'Arial Black', sans-serif;
        }

        #btn-g { 
            background: #4caf50; 
            border-color: #2e7d32;
            box-shadow: 0 5px 0px #1b5e20; /* Efecto de relieve */
        }
        #btn-b { 
            background: #f44336; 
            border-color: #c62828;
            box-shadow: 0 5px 0px #8e1c1c; 
        }
        #btn-z { 
            background: #607d8b; 
            border-color: #455a64;
            box-shadow: 0 5px 0px #2a3a41; 
            max-width: 90px;
        }

        /* Efecto al presionar los botones */
        .btn:active { 
            transform: translateY(3px); /* Se hunden al pulsar */
            box-shadow: 0 2px 0px #1b5e20; /* Menor relieve al pulsar (ejemplo verde) */
        }
        #btn-b:active { box-shadow: 0 2px 0px #8e1c1c; }
        #btn-z:active { box-shadow: 0 2px 0px #2a3a41; }

        /* Historial de registros */
        .log-container { 
            margin-top: 30px; 
            text-align: left; 
            max-height: 200px; 
            overflow-y: auto; 
            background: rgba(17, 17, 17, 0.9); 
            border-radius: 0; 
            padding: 15px; 
            font-size: 0.9rem; 
            border: 1px solid #333;
            color: #888;
        }
        .log-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 8px 5px; 
            border-bottom: 1px solid #222; 
        }
        .log-item:last-child { border-bottom: none; }
        .log-type.bueno { color: #4caf50; font-weight: bold; }
        .log-type.malo { color: #f44336; font-weight: bold; }
        .log-diff { background: #222; padding: 2px 8px; border-radius: 0; font-weight: bold; color: #fff; font-family: monospace; }
        .log-time { color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    
    <a href="https://discord.gg/CCT4c52RRz" target="_blank" class="gta-title-link">
        ColivaresVRD
    </a>

    <div style="font-size: 0.8rem; color: #666; letter-spacing: 1px; margin-bottom: -5px;">TIEMPO DE SESIÓN</div>
    <div class="main-timer" id="display">00:00:00</div>

    <div class="stats">
        <div class="box bueno">
            <span>Buenos</span>
            <span class="count" id="c-bueno">0</span>
        </div>
        <div class="box malo">
            <span>Malos</span>
            <span class="count" id="c-malo">0</span>
        </div>
    </div>

    <div class="buttons-container">
        <button class="btn" id="btn-g">Bueno (G)</button>
        <button class="btn" id="btn-b">Malo (B)</button>
        <button class="btn" id="btn-z">Undo (Z)</button>
    </div>

    <div class="log-container">
        <div id="log"></div>
    </div>
</div>

<script>
    // Lógica del contador (sin cambios, solo adaptada para este diseño)
    let startTime, timerInterval, history = [];

    const display = document.getElementById('display');
    const log = document.getElementById('log');

    // Función para formatear el tiempo
    function timeString(ms) {
        let s = Math.floor(ms / 1000);
        let m = Math.floor(s / 60);
        let h = Math.floor(m / 60);
        return [h, m % 60, s % 60].map(v => v.toString().padStart(2, '0')).join(':');
    }

    // Actualiza los marcadores y el historial visualmente
    function updateStats() {
        const b = history.filter(x => x.type === 'Bueno').length;
        const m = history.filter(x => x.type === 'Malo').length;
        document.getElementById('c-bueno').innerText = b;
        document.getElementById('c-malo').innerText = m;
        
        // Dibuja el historial (los más nuevos primero)
        log.innerHTML = history.slice().reverse().map(i => `
            <div class="log-item">
                <span class="log-type ${i.type.toLowerCase()}">${i.type.toUpperCase()}</span> 
                <span class="log-diff">${i.diff}</span>
                <span class="log-time">${i.time}</span>
            </div>
        `).join('');
    }

    // Registra un nuevo clic
    function addRecord(type) {
        const now = new Date();
        
        // Iniciar el cronómetro si es el primer registro
        if (!startTime) {
            startTime = now;
            timerInterval = setInterval(() => {
                display.innerText = timeString(new Date() - startTime);
            }, 1000);
        }

        // Calcular la diferencia de tiempo con el registro anterior
        let diff = "Inicio";
        if (history.length > 0) {
            const lastRecord = history[history.length-1];
            diff = ((now - lastRecord.raw) / 1000).toFixed(2) + "s";
        }

        // Guardar el registro en el historial
        history.push({ 
            type, 
            raw: now, 
            time: now.toLocaleTimeString(), 
            diff: diff 
        });
        
        updateStats();
    }

    // Borra el último registro
    function undo() {
        if (history.length > 0) {
            history.pop();
            // Si el historial queda vacío, resetear el reloj
            if (history.length === 0) {
                clearInterval(timerInterval);
                startTime = null;
                display.innerText = "00:00:00";
            }
            updateStats();
        }
    }

    // Asignar eventos a los botones
    document.getElementById('btn-g').onclick = () => addRecord('Bueno');
    document.getElementById('btn-b').onclick = () => addRecord('Malo');
    document.getElementById('btn-z').onclick = undo;

    // Asignar atajos de teclado
    document.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'g') addRecord('Bueno');
        if (e.key.toLowerCase() === 'b') addRecord('Malo');
        if (e.key.toLowerCase() === 'z') undo();
    });
</script>

</body>
</html>
