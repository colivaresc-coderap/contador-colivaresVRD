<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COLIVARESVRD | PERFORMANCE PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { 
            font-family: 'Arial Black', sans-serif; text-align: center; 
            background-color: #0d0d0d;
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.9)), url('https://i.imgur.com/8N4I8nI.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-transform: uppercase; box-sizing: border-box; 
        }
        .container { 
            background: rgba(10, 10, 10, 0.92); padding: 25px; border-radius: 12px; 
            border: 2px solid rgba(0, 212, 255, 0.6); 
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4), 0 0 40px rgba(0, 212, 255, 0.2); 
            width: 100%; max-width: 480px; 
        }
        .gta-title-link { text-decoration: none; color: #00d4ff; font-size: 2rem; font-weight: 900; text-shadow: 0 0 10px #00d4ff, 2px 2px 0px #ff00d4; display: block; margin-bottom: 5px; }
        .main-timer { font-size: 3.8rem; font-weight: bold; margin-top: 15px; color: #ff00d4; font-family: 'Courier New', monospace; text-shadow: 0 0 15px #ff00d4, 0 0 30px #ff00d4; display: inline-block; width: 100%; }
        .avg-section { margin: 10px 0 20px 0; border-radius: 8px; background: rgba(255, 0, 212, 0.1); padding: 10px; border: 1px solid rgba(255, 0, 212, 0.4); box-shadow: 0 0 15px rgba(255, 0, 212, 0.2); }
        .avg-label { font-size: 0.7rem; color: #ff00d4; letter-spacing: 4px; font-weight: bold; margin-bottom: 5px;}
        .avg-time { font-size: 1.4rem; color: #fff; font-family: 'Courier New', monospace; font-weight: bold; }
        .setup-section { background: #1a1a1a; padding: 15px; margin-bottom: 15px; border: 1px solid #00d4ff; border-radius: 5px;}
        input { background: #000; border: 1px solid #00d4ff; color: #00d4ff; padding: 10px; width: 120px; text-align: center; font-family: 'Arial Black'; font-size: 1.3rem; margin: 5px 0; }
        .stats { display: flex; gap: 15px; margin-bottom: 25px; }
        .box { flex: 1; padding: 18px; border: 1px solid #333; background: rgba(10, 10, 10, 0.6); border-radius: 8px;}
        .count { font-size: 2.8rem; font-weight: 900; }
        .btn { padding: 18px; font-size: 1.1rem; cursor: pointer; border: none; color: white; font-weight: bold; width: 100%; text-transform: uppercase; border: 2px solid; box-shadow: 0 4px 0px rgba(0,0,0,0.5); margin-bottom: 10px; border-radius: 5px; }
        #btn-complete { background: #2e7d32; border-color: #4caf50; height: 80px; font-size: 1.5rem; }
        .log-container { margin-top: 25px; text-align: left; max-height: 200px; overflow-y: auto; background: #000; padding: 15px; border: 1px solid #222; font-family: monospace; font-size: 0.8rem; border-radius: 5px;}
        .log-entry { padding: 8px 0; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        .lap-time { color: #00d4ff; font-weight: bold; margin-left: 5px; }
        .delta-pos { color: #4caf50; font-weight: bold; margin: 0 5px; } 
        .delta-neg { color: #f44336; font-weight: bold; margin: 0 5px; } 
    </style>
</head>
<body>
<div class="container">
    <a href="https://discord.gg/CCT4c52RRz" target="_blank" class="gta-title-link">COLIVARESVRD</a>
    <div class="setup-section" id="setup">
        <input type="number" id="input-total" placeholder="0">
        <button class="btn" id="btn-set" style="background:#008ba3; border-color:#00d4ff; width:auto; font-size:0.9rem;">FIJAR Y EMPEZAR</button>
    </div>
    <div class="main-timer" id="display">00:00:00</div>
    <div class="avg-section" id="avg-display" style="display:none;">
        <div class="avg-label">PROMEDIO POR ARTÍCULO</div>
        <div class="avg-time" id="avg-value">00:00:00</div>
    </div>
    <div class="stats">
        <div class="box" style="border-left: 5px solid #ff9800;"><span style="font-size:0.7rem; color:#aaa;">PENDIENTES</span><div class="count" id="c-pendientes" style="color:#ff9800">0</div></div>
        <div class="box" style="border-left: 5px solid #4caf50;"><span style="font-size:0.7rem; color:#aaa;">COMPLETADOS</span><div class="count" id="c-completados" style="color:#4caf50">0</div></div>
    </div>
    <button class="btn" id="btn-complete">COMPLETAR (G)</button>
    <button class="btn" id="btn-undo" style="background:#455a64; border-color:#607d8b; font-size:0.9rem;">DESHACER (Z)</button>
    <button class="btn" id="btn-reset" style="background:#d32f2f; border-color:#f44336; font-size:0.8rem; margin-top:15px; opacity:0.8;">REINICIAR SALA</button>
    <div class="log-container" id="log-list"></div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyCcRPE7BCaQVOepkfMFRRDOgTnigcO4218", authDomain: "contador-colivares.firebaseapp.com", projectId: "contador-colivares", databaseURL: "https://contador-colivares-default-rtdb.firebaseio.com", storageBucket: "contador-colivares.firebasestorage.app", appId: "1:774526373630:web:a0f15a1c6727a50b2c1faf" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('sesion') || 'general';
    const sessionRef = db.ref('audit_v_avg_es/' + sessionId);

    let timerInterval = null;

    function formatTime(ms) {
        const s = Math.floor(ms / 1000);
        const h = Math.floor(s / 3600).toString().padStart(2, '0');
        const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
        const sec = (s % 60).toString().padStart(2, '0');
        return `${h}:${m}:${sec}`;
    }

    sessionRef.on('value', (snapshot) => {
        const data = snapshot.val() || { pendientes: 0, completados: 0, startAt: null, totalInicial: 0, history: [], locked: false };
        document.getElementById('c-pendientes').innerText = data.pendientes;
        document.getElementById('c-completados').innerText = data.completados;
        document.getElementById('setup').style.display = data.locked ? 'none' : 'block';
        document.getElementById('avg-display').style.display = data.locked ? 'block' : 'none';

        if (data.startAt) {
            if (data.pendientes === 0) {
                clearInterval(timerInterval);
                const totalMs = data.finishAt - data.startAt;
                document.getElementById('display').innerText = formatTime(totalMs);
                document.getElementById('avg-value').innerText = formatTime(Math.floor(totalMs / data.completados));
            } else {
                if (!timerInterval) {
                    timerInterval = setInterval(() => {
                        const elapsed = Date.now() - data.startAt;
                        document.getElementById('display').innerText = formatTime(elapsed);
                        // PROMEDIO: Siempre divide por (completados + 1) si no ha terminado el primero, o por completados.
                        // Ajuste solicitado: El promedio se ve desde que inicia.
                        const divisor = data.completados > 0 ? data.completados : 1; 
                        document.getElementById('avg-value').innerText = formatTime(Math.floor(elapsed / divisor));
                    }, 1000);
                }
            }
        } else { clearInterval(timerInterval); timerInterval = null; document.getElementById('display').innerText = "00:00:00"; }
        // Render historial... (igual al anterior)
        const logHtml = (data.history || []).map(h => {
            let deltaHtml = h.delta ? `<span class="${h.delta.startsWith('-') ? 'delta-pos' : 'delta-neg'}">(${h.delta})</span>` : "";
            return `<div class="log-entry"><span class="log-action ${h.action}">${h.action.toUpperCase()} ${h.val || ''} <span class="lap-time">${h.lap || ''}</span></span><span>${deltaHtml} <span style="color:#555; font-size:0.75rem;">TOT: ${h.split}</span></span></div>`;
        }).join('');
        document.getElementById('log-list').innerHTML = logHtml;
        document.getElementById('log-list').scrollTop = document.getElementById('log-list').scrollHeight;
    });

    document.getElementById('btn-set').onclick = () => {
        const total = parseInt(document.getElementById('input-total').value);
        if (total > 0) sessionRef.set({ pendientes: total, completados: 0, startAt: Date.now(), finishAt: null, totalInicial: total, locked: true, history: [{action: "fijar", val: total, split: "00:00:00"}] });
    };

    function completeTask() {
        sessionRef.once('value', (snapshot) => {
            const data = snapshot.val();
            if (!data || data.pendientes <= 0) return;
            const now = Date.now();
            const totalElapsedMs = now - data.startAt;
            data.pendientes--; data.completados++;
            
            const history = data.history || [];
            const completionLogs = history.filter(l => l.action === 'completar');
            const lastTotalMs = completionLogs.length > 0 ? parseTimeToMs(completionLogs[completionLogs.length - 1].split) : 0;
            const currentLapMs = totalElapsedMs - lastTotalMs;
            
            let deltaStr = "";
            if (data.completados >= 3) {
                const prevLapMs = parseTimeToMs(completionLogs[completionLogs.length - 1].split) - (completionLogs[completionLogs.length - 2] ? parseTimeToMs(completionLogs[completionLogs.length - 2].split) : 0);
                const diff = Math.round((currentLapMs - prevLapMs) / 1000);
                deltaStr = diff <= 0 ? `${diff}s` : `+${diff}s`;
            }

            data.history.push({ action: "completar", val: data.completados, split: formatTime(totalElapsedMs), lap: formatTime(currentLapMs), delta: deltaStr });
            if (data.pendientes === 0) data.finishAt = now;
            sessionRef.set(data);
        });
    }
    function parseTimeToMs(t) { const p = t.split(':'); return ((+p[0]*3600)+(+p[1]*60)+(+p[2]))*1000; }
    document.getElementById('btn-complete').onclick = completeTask;
    document.addEventListener('keydown', (e) => { if(e.key.toLowerCase()==='g') completeTask(); });
    document.getElementById('btn-reset').onclick = () => { if (prompt(`Escribe "${sessionId}" para reiniciar:`) === sessionId) sessionRef.set({ pendientes: 0, completados: 0, startAt: null, locked: false, history: [] }); };
</script>
</body>
</html>
