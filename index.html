<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COLIVARESVRD | GTA Counter Mobile</title>
    <style>
        /* ESTILOS BASE (Se aplican a todos los dispositivos) */
        body { 
            font-family: 'Arial Black', 'Helvetica Bold', sans-serif; 
            text-align: center; 
            background: #0d0d0d; 
            color: white; 
            margin: 0; 
            padding: 10px; /* Un poco de aire en los bordes */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            text-transform: uppercase; 
            box-sizing: border-box;
        }

        .container { 
            background: rgba(20, 20, 20, 0.98); 
            padding: 20px; 
            border-radius: 5px; 
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); 
            width: 100%; /* Ocupa todo el ancho disponible */
            max-width: 450px; /* Pero no se hace gigante en PC */
            border: 1px solid #333; 
            box-sizing: border-box;
        }

        .gta-title-link {
            text-decoration: none; 
            color: #00d4ff; 
            font-size: 1.8rem; /* Tamaño base */
            font-weight: 900; 
            text-shadow: 2px 2px 0px #ff00d4; 
            display: inline-block;
            margin-bottom: 15px;
            word-wrap: break-word; /* Evita que el nombre largo rompa el diseño */
        }

        .label-tiempo {
            font-size: 0.7rem; 
            color: #666; 
            letter-spacing: 1px; 
            margin-bottom: -5px;
        }

        .main-timer { 
            font-size: 3rem; /* Tamaño base */
            font-weight: bold; 
            margin: 5px 0 20px 0; 
            color: #ff00d4; 
            font-family: 'Courier New', monospace; 
            text-shadow: 0 0 10px rgba(255, 0, 212, 0.5); 
            border-bottom: 2px solid #ff00d4;
            display: inline-block;
            padding-bottom: 5px;
        }

        .stats { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
        }

        .box { 
            flex: 1; 
            padding: 15px; 
            border-radius: 3px; 
            color: white; 
            border: 1px solid #333;
        }
        .bueno { background: rgba(46, 125, 50, 0.6); }
        .malo { background: rgba(198, 40, 40, 0.6); }
        
        .box span { font-size: 0.8rem; display: block; margin-bottom: 5px; color: #aaa; }
        .box .count { font-size: 2.5rem; color: #fff; text-shadow: 2px 2px 0px #000; font-weight: 900; }

        .buttons-container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn { 
            padding: 15px; 
            font-size: 1rem; 
            cursor: pointer; 
            border: none; 
            color: white; 
            font-weight: bold; 
            flex: 1; 
            text-transform: uppercase; 
            border: 2px solid;
            box-shadow: 0 4px 0px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
        }

        #btn-g { background: #4caf50; border-color: #2e7d32; }
        #btn-b { background: #f44336; border-color: #c62828; }
        #btn-z { background: #607d8b; border-color: #455a64; max-width: 80px; }

        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0px rgba(0,0,0,0.5); }

        .log-container { 
            margin-top: 25px; 
            text-align: left; 
            max-height: 150px; 
            overflow-y: auto; 
            background: rgba(0,0,0,0.8); 
            padding: 10px; 
            font-size: 0.8rem; 
            border: 1px solid #222;
            color: #888;
        }
        .log-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #222; }
        .log-type.bueno { color: #4caf50; }
        .log-type.malo { color: #f44336; }

        /* ========================================= */
        /* MEDIA QUERIES (Ajustes específicos para MÓVIL) */
        /* ========================================= */
        
        @media (max-width: 480px) {
            .container {
                padding: 15px; /* Menos padding interno */
            }

            .gta-title-link {
                font-size: 1.5rem; /* Título más pequeño */
            }

            .main-timer {
                font-size: 2.5rem; /* Reloj más pequeño */
                width: 100%; /* Que ocupe todo el ancho para centrarse bien */
            }

            .box {
                padding: 10px; /* Cuadros de texto más pequeños */
            }
            .box span { font-size: 0.7rem; }
            .box .count { font-size: 2rem; }

            /* TRUCO MAESTRO: Los botones se ponen en columna (uno abajo del otro) */
            .buttons-container {
                flex-direction: column; 
                gap: 8px;
            }

            .btn {
                width: 100%; /* Botones a lo ancho */
                max-width: 100% !important; /* Quitar el límite del botón Undo */
                padding: 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    
    <a href="https://discord.gg/CCT4c52RRz" target="_blank" class="gta-title-link">
        ColivaresVRD
    </a>

    <div class="label-tiempo">TIEMPO DE SESIÓN</div>
    <div class="main-timer" id="display">00:00:00</div>

    <div class="stats">
        <div class="box bueno">
            <span>Buenos</span>
            <span class="count" id="c-bueno">0</span>
        </div>
        <div class="box malo">
            <span>Malos</span>
            <span class="count" id="c-malo">0</span>
        </div>
    </div>

    <div class="buttons-container">
        <button class="btn" id="btn-g">Bueno (G)</button>
        <button class="btn" id="btn-b">Malo (B)</button>
        <button class="btn" id="btn-z">Undo (Z)</button>
    </div>

    <div class="log-container">
        <div id="log"></div>
    </div>
</div>

<script>
    /* La lógica de JavaScript se mantiene igual, no necesita cambios */
    let startTime, timerInterval, history = [];
    const display = document.getElementById('display');
    const log = document.getElementById('log');

    function timeString(ms) {
        let s = Math.floor(ms / 1000);
        let m = Math.floor(s / 60);
        let h = Math.floor(m / 60);
        return [h, m % 60, s % 60].map(v => v.toString().padStart(2, '0')).join(':');
    }

    function updateStats() {
        const b = history.filter(x => x.type === 'Bueno').length;
        const m = history.filter(x => x.type === 'Malo').length;
        document.getElementById('c-bueno').innerText = b;
        document.getElementById('c-malo').innerText = m;
        
        log.innerHTML = history.slice().reverse().map(i => `
            <div class="log-item">
                <span class="log-type ${i.type.toLowerCase()}">${i.type.toUpperCase()}</span> 
                <span class="log-time">${i.time}</span>
            </div>
        `).join('');
    }

    function addRecord(type) {
        const now = new Date();
        if (!startTime) {
            startTime = now;
            timerInterval = setInterval(() => {
                display.innerText = timeString(new Date() - startTime);
            }, 1000);
        }
        let diff = history.length > 0 ? ((now - history[history.length-1].raw) / 1000).toFixed(2) + "s" : "Inicio";
        history.push({ type, raw: now, time: now.toLocaleTimeString(), diff });
        updateStats();
    }

    function undo() {
        if (history.length > 0) {
            history.pop();
            if (history.length === 0) {
                clearInterval(timerInterval);
                startTime = null;
                display.innerText = "00:00:00";
            }
            updateStats();
        }
    }

    document.getElementById('btn-g').onclick = () => addRecord('Bueno');
    document.getElementById('btn-b').onclick = () => addRecord('Malo');
    document.getElementById('btn-z').onclick = undo;

    document.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'g') addRecord('Bueno');
        if (e.key.toLowerCase() === 'b') addRecord('Malo');
        if (e.key.toLowerCase() === 'z') undo();
    });
</script>

</body>
</html>
