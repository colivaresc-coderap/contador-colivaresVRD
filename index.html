<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COLIVARESVRD | LIVE SESSION</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Arial Black', sans-serif; text-align: center; background: #0d0d0d; color: white; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-transform: uppercase; box-sizing: border-box; }
        .container { background: rgba(20, 20, 20, 0.98); padding: 20px; border-radius: 5px; box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); width: 100%; max-width: 450px; border: 1px solid #333; }
        .gta-title-link { text-decoration: none; color: #00d4ff; font-size: 1.8rem; font-weight: 900; text-shadow: 2px 2px 0px #ff00d4; display: inline-block; margin-bottom: 10px; transition: 0.3s; }
        .gta-title-link:hover { color: #ff00d4; text-shadow: 2px 2px 0px #00d4ff; }
        .session-badge { font-size: 0.6rem; color: #555; margin-bottom: 10px; display: block; }
        .main-timer { font-size: 3.5rem; font-weight: bold; margin: 5px 0 20px 0; color: #ff00d4; font-family: 'Courier New', monospace; text-shadow: 0 0 10px rgba(255, 0, 212, 0.5); border-bottom: 2px solid #ff00d4; display: inline-block; }
        .stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .box { flex: 1; padding: 15px; border: 1px solid #333; background: rgba(255,255,255,0.05); }
        .bueno-box { border-left: 5px solid #4caf50; }
        .malo-box { border-left: 5px solid #f44336; }
        .box span { font-size: 0.7rem; color: #888; display: block; }
        .count { font-size: 2.5rem; font-weight: 900; }
        .buttons-container { display: flex; flex-direction: column; gap: 10px; }
        .btn-row { display: flex; gap: 10px; }
        .btn { padding: 18px; font-size: 1rem; cursor: pointer; border: none; color: white; font-weight: bold; flex: 1; text-transform: uppercase; border: 2px solid transparent; transition: 0.1s; }
        #btn-g { background: #2e7d32; border-color: #4caf50; box-shadow: 0 4px #1b5e20; }
        #btn-b { background: #c62828; border-color: #f44336; box-shadow: 0 4px #8e1c1c; }
        #btn-z { background: #455a64; border-color: #607d8b; box-shadow: 0 4px #263238; max-width: 100px; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .log-container { margin-top: 20px; text-align: left; max-height: 120px; overflow-y: auto; background: #000; padding: 10px; font-size: 0.7rem; border: 1px solid #222; font-family: monospace; }
        .log-item { display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding: 4px 0; }
        @media (max-width: 480px) { .main-timer { font-size: 2.8rem; } .gta-title-link { font-size: 1.5rem; } }
    </style>
</head>
<body>

<div class="container">
    <a href="https://discord.gg/CCT4c52RRz" target="_blank" class="gta-title-link">ColivaresVRD</a>
    <span class="session-badge" id="session-name">SALA: GENERAL</span>

    <div class="main-timer" id="display">00:00:00</div>

    <div class="stats">
        <div class="box bueno-box"><span>BUENOS</span><div class="count" id="c-bueno" style="color:#4caf50">0</div></div>
        <div class="box malo-box"><span>MALOS</span><div class="count" id="c-malo" style="color:#f44336">0</div></div>
    </div>

    <div class="buttons-container">
        <div class="btn-row">
            <button class="btn" id="btn-g">Bueno (G)</button>
            <button class="btn" id="btn-b">Malo (B)</button>
        </div>
        <button class="btn" style="align-self:center" id="btn-z">Undo (Z)</button>
    </div>

    <div class="log-container" id="log"></div>
</div>

<script>
    // TU CONFIGURACIÓN DE FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyCcRPE7BCaQVOepkfMFRRDOgTnigcO4218",
      authDomain: "contador-colivares.firebaseapp.com",
      projectId: "contador-colivares",
      databaseURL: "https://contador-colivares-default-rtdb.firebaseio.com", // Verifica esta URL en tu consola
      storageBucket: "contador-colivares.firebasestorage.app",
      appId: "1:774526373630:web:a0f15a1c6727a50b2c1faf"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Obtener ID de sesión de la URL o usar "general"
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('sesion') || 'general';
    document.getElementById('session-name').innerText = `SALA: ${sessionId.toUpperCase()}`;
    const sessionRef = db.ref('sesiones/' + sessionId);

    let startTime = null;
    let timerInterval = null;

    // Escuchar cambios en tiempo real desde Firebase
    sessionRef.on('value', (snapshot) => {
        const data = snapshot.val() || { buenos: 0, malos: 0, history: [], startAt: null };
        
        document.getElementById('c-bueno').innerText = data.buenos;
        document.getElementById('c-malo').innerText = data.malos;
        
        // Actualizar Historial
        const logHtml = (data.history || []).slice().reverse().map(h => 
            `<div class="log-item"><span style="color:${h.type=='Bueno'?'#4caf50':'#f44336'}">${h.type}</span> <span>${h.time}</span></div>`
        ).join('');
        document.getElementById('log').innerHTML = logHtml;

        // Sincronizar Reloj
        if (data.startAt && !timerInterval) {
            startTime = data.startAt;
            startTimer();
        } else if (!data.startAt) {
            stopTimer();
        }
    });

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const ms = Date.now() - startTime;
            const s = Math.floor(ms/1000);
            document.getElementById('display').innerText = 
                [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(v=>v.toString().padStart(2,'0')).join(':');
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        document.getElementById('display').innerText = "00:00:00";
    }

    function addRecord(type) {
        sessionRef.once('value', (snapshot) => {
            const data = snapshot.val() || { buenos: 0, malos: 0, history: [], startAt: null };
            
            if (!data.startAt) data.startAt = Date.now();
            
            if (type === 'Bueno') data.buenos++;
            else data.malos++;

            const newEntry = { type, time: new Date().toLocaleTimeString() };
            if (!data.history) data.history = [];
            data.history.push(newEntry);

            sessionRef.set(data);
        });
    }

    function undo() {
        sessionRef.once('value', (snapshot) => {
            const data = snapshot.val();
            if (!data || !data.history || data.history.length === 0) return;

            const last = data.history.pop();
            if (last.type === 'Bueno') data.buenos--;
            else data.malos--;

            if (data.history.length === 0) data.startAt = null;
            
            sessionRef.set(data);
        });
    }

    // Botones y Teclas
    document.getElementById('btn-g').onclick = () => addRecord('Bueno');
    document.getElementById('btn-b').onclick = () => addRecord('Malo');
    document.getElementById('btn-z').onclick = undo;
    document.addEventListener('keydown', (e) => {
        if(e.key.toLowerCase()==='g') addRecord('Bueno');
        if(e.key.toLowerCase()==='b') addRecord('Malo');
        if(e.key.toLowerCase()==='z') undo();
    });
</script>
</body>
</html>
