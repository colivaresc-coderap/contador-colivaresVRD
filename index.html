<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COLIVARESVRD | TASK CONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Arial Black', sans-serif; text-align: center; background: #0d0d0d; color: white; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-transform: uppercase; box-sizing: border-box; }
        .container { background: rgba(20, 20, 20, 0.98); padding: 20px; border-radius: 5px; box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); width: 100%; max-width: 450px; border: 1px solid #333; }
        .gta-title { color: #00d4ff; font-size: 1.8rem; font-weight: 900; text-shadow: 2px 2px 0px #ff00d4; margin-bottom: 10px; display: block; }
        
        /* Efecto de Parpadeo al Finalizar */
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .finished { animation: blink 0.8s infinite; color: #4caf50 !important; border-color: #4caf50 !important; }
        
        .main-timer { font-size: 3.5rem; font-weight: bold; margin: 10px 0; color: #ff00d4; font-family: 'Courier New', monospace; text-shadow: 0 0 10px rgba(255, 0, 212, 0.5); border-bottom: 2px solid #ff00d4; display: inline-block; width: 100%; }
        
        .setup-section { background: #1a1a1a; padding: 10px; margin-bottom: 15px; border: 1px dashed #444; }
        input { background: #000; border: 1px solid #00d4ff; color: #00d4ff; padding: 10px; width: 80px; text-align: center; font-family: 'Arial Black'; font-size: 1.2rem; }
        
        .stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .box { flex: 1; padding: 15px; border: 1px solid #333; background: rgba(255,255,255,0.05); }
        .pend-box { border-left: 5px solid #ff9800; }
        .comp-box { border-left: 5px solid #4caf50; }
        .box span { font-size: 0.7rem; color: #888; display: block; margin-bottom: 5px; }
        .count { font-size: 2.8rem; font-weight: 900; }

        .btn { padding: 20px; font-size: 1.2rem; cursor: pointer; border: none; color: white; font-weight: bold; width: 100%; text-transform: uppercase; border: 2px solid; box-shadow: 0 5px 0px rgba(0,0,0,0.5); margin-bottom: 10px; transition: 0.1s; }
        #btn-complete { background: #2e7d32; border-color: #4caf50; }
        #btn-set { background: #008ba3; border-color: #00d4ff; padding: 10px; font-size: 0.8rem; }
        #btn-undo { background: #455a64; border-color: #607d8b; font-size: 0.8rem; padding: 10px; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn:disabled { background: #333; border-color: #444; color: #666; cursor: not-allowed; }

        .status-msg { font-size: 1.5rem; font-weight: 900; margin: 10px 0; display: none; color: #4caf50; text-shadow: 2px 2px 0px #000; }
    </style>
</head>
<body>

<div class="container">
    <span class="gta-title">COLIVARESVRD</span>
    
    <div class="setup-section" id="setup">
        <span style="font-size: 0.7rem; color: #aaa;">ASIGNAR TOTAL:</span><br>
        <input type="number" id="input-total" value="0">
        <button class="btn" id="btn-set" style="width: auto;">FIJAR</button>
    </div>

    <div class="status-msg" id="msg-finish">¡COMPLETADO!</div>
    <div class="main-timer" id="display">00:00:00</div>

    <div class="stats">
        <div class="box pend-box"><span>PENDIENTES</span><div class="count" id="c-pendientes" style="color:#ff9800">0</div></div>
        <div class="box comp-box"><span>COMPLETADOS</span><div class="count" id="c-completados" style="color:#4caf50">0</div></div>
    </div>

    <button class="btn" id="btn-complete">COMPLETAR (G)</button>
    <button class="btn" id="btn-undo">DESHACER (Z)</button>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCcRPE7BCaQVOepkfMFRRDOgTnigcO4218",
      authDomain: "contador-colivares.firebaseapp.com",
      projectId: "contador-colivares",
      databaseURL: "https://contador-colivares-default-rtdb.firebaseio.com",
      storageBucket: "contador-colivares.firebasestorage.app",
      appId: "1:774526373630:web:a0f15a1c6727a50b2c1faf"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('sesion') || 'general';
    const sessionRef = db.ref('tareas/' + sessionId);

    let timerInterval = null;

    sessionRef.on('value', (snapshot) => {
        const data = snapshot.val() || { pendientes: 0, completados: 0, startAt: null, finishAt: null };
        
        document.getElementById('c-pendientes').innerText = data.pendientes;
        document.getElementById('c-completados').innerText = data.completados;

        const isFinished = data.pendientes === 0 && data.completados > 0;

        if (isFinished) {
            document.getElementById('display').classList.add('finished');
            document.getElementById('msg-finish').style.display = 'block';
            document.getElementById('btn-complete').disabled = true;
            clearInterval(timerInterval);
            timerInterval = null;
            renderTime(data.finishAt - data.startAt);
        } else {
            document.getElementById('display').classList.remove('finished');
            document.getElementById('msg-finish').style.display = 'none';
            document.getElementById('btn-complete').disabled = false;
            
            if (data.startAt) {
                if (!timerInterval) startTimer(data.startAt);
            } else {
                stopTimer();
            }
        }
    });

    function renderTime(ms) {
        if (ms < 0) ms = 0;
        const s = Math.floor(ms / 1000);
        const h = Math.floor(s / 3600).toString().padStart(2, '0');
        const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
        const sec = (s % 60).toString().padStart(2, '0');
        document.getElementById('display').innerText = `${h}:${m}:${sec}`;
    }

    function startTimer(start) {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            renderTime(Date.now() - start);
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        document.getElementById('display').innerText = "00:00:00";
    }

    // BOTÓN FIJAR TOTAL
    document.getElementById('btn-set').onclick = () => {
        const total = parseInt(document.getElementById('input-total').value);
        if (total > 0) {
            sessionRef.set({ pendientes: total, completados: 0, startAt: null, finishAt: null });
        }
    };

    // BOTÓN COMPLETAR
    function completeTask() {
        sessionRef.once('value', (snapshot) => {
            const data = snapshot.val() || { pendientes: 0, completados: 0, startAt: null };
            if (data.pendientes > 0) {
                if (!data.startAt) data.startAt = Date.now();
                data.pendientes--;
                data.completados++;
                if (data.pendientes === 0) data.finishAt = Date.now();
                sessionRef.set(data);
            }
        });
    }

    // BOTÓN DESHACER
    function undo() {
        sessionRef.once('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.completados > 0) {
                data.pendientes++;
                data.completados--;
                data.finishAt = null;
                if (data.completados === 0) data.startAt = null;
                sessionRef.set(data);
            }
        });
    }

    document.getElementById('btn-complete').onclick = completeTask;
    document.getElementById('btn-undo').onclick = undo;
    document.addEventListener('keydown', (e) => {
        if(e.key.toLowerCase()==='g') completeTask();
        if(e.key.toLowerCase()==='z') undo();
    });
</script>
</body>
</html>
